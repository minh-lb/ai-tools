interface:
  display_name: "CC Team Full — Leader + Tester + Coder + Reviewer"
  short_description: "Boot a full multi-agent TDD team: spec → testcases → tests → implement → verify → review"
  default_prompt: |
    Use $cc-team-full to boot a full Claude Code + Codex agent team.
    Read `references/leader.md` first — it contains the full 5-phase workflow.
    Boot only: use TeamCreate to create Leader and Tester agents (Coder and Reviewer are Codex — invoked on-demand, not TeamCreate agents), report team ready, then wait for the user to provide a task.
policy:
  allow_implicit_invocation: false
