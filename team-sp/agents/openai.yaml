interface:
  display_name: "Team SP — Superpowers Native Team"
  short_description: "Boot a superpowers-native agent team: Planner (brainstorming+writing-plans), Leader (executing-plans), Coder (Codex+verification)"
  default_prompt: |
    Use $team-sp to boot a superpowers-native agent team.
    Read all reference files before booting: references/planner.md, references/leader.md, references/coder.md, references/reviewer.md.
    Boot creates Leader, Planner, and Coder agents. After boot, wait for user task before starting any work.
policy:
  allow_implicit_invocation: false
