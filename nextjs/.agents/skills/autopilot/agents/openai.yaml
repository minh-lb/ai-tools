interface:
  display_name: "Autopilot"
  short_description: "Spec-first AI dev pipeline: spec, plan, implement, test, commit"
  default_prompt: "Use $autopilot to run the full development pipeline. Read AGENTS.md for context loading, docs/coding-standards.md for shared rules, docs/design.md for core UI defaults, docs/design-extended.md only when detailed visual constraints are needed, and docs/visual-acceptance.md for user-facing UI verification. Start with /autopilot spec {requirement} to create a spec, then /autopilot run to implement."
